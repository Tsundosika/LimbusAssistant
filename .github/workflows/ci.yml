name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build LimbusAssistant.sln -c Debug

      - name: Test
        run: dotnet test LimbusAssistant.sln -c Debug --no-build
